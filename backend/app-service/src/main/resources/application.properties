spring.application.name=app-service

# DataSource — local Docker PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/calledit
spring.datasource.username=calledit
spring.datasource.password=calledit
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
